services:
  postgres:
    image: postgres:15
    container_name: medicloud_postgres
    environment:
      POSTGRES_USER:     medicloud
      POSTGRES_PASSWORD: medicloud123
      POSTGRES_DB:       medicloud_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicloud_backend
    environment:
      DATABASE_URL: postgresql://medicloud:medicloud123@postgres:5432/medicloud_db
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicloud_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: